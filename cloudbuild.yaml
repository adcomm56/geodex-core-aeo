steps:
  # Step 1: Install and Build
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # Step 2: Deploy with the "Clear" flag
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'geodex-live'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--clear-base-image'

options:
  logging: CLOUD_LOGGING_ONLY
