steps:
  # Step 1: Install dependencies and build the Astro site
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'geodex-live'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-images/geodex-aeo:latest'
